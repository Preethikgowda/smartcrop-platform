# ============================================================
# AgriSmart Platform — Global Centralized Values
# ============================================================
# This is the ONLY values file. Every chart consumes this via:
#   helm install <name> ./<chart> -f values.yaml
# ============================================================

imagePullPolicy: IfNotPresent

# ─── Application Services ────────────────────────────────────

frontend:
  image: smartcrop-platform_frontend
  port: 80
  replicas: 1

userService:
  image: smartcrop-platform_user-service
  port: 8001
  replicas: 1

cropAdvisoryService:
  image: smartcrop-platform_crop-advisory-service
  port: 8002
  replicas: 1

marketplaceService:
  image: smartcrop-platform_marketplace-service
  port: 8003
  replicas: 1

# ─── Infrastructure ──────────────────────────────────────────

postgres:
  image: postgres:15-alpine
  port: 5432
  user: postgres
  password: postgres_password
  database: agrismart
  databases:
    user: userdb
    crop: cropdb
    market: marketdb

redis:
  image: redis:7-alpine
  port: 6379

# ─── Shared Environment ──────────────────────────────────────

jwt:
  secret: your_super_secret_jwt_key_change_in_production
  algorithm: HS256
  expiryMinutes: "1440"

openweather:
  apiKey: your_openweather_api_key

# ─── Resource Defaults ───────────────────────────────────────

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"
