apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agrismart-routes
  namespace: default
spec:
  parentRefs:
    - name: agrismart-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          port: 8001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/crops
      backendRefs:
        - name: crop-advisory-service
          port: 8002
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/market
      backendRefs:
        - name: marketplace-service
          port: 8003
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 80
