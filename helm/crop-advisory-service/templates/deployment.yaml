apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crop-advisory-service.fullname" . }}
  labels:
    {{- include "crop-advisory-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.global.services.crop.replicas }}
  selector:
    matchLabels:
      {{- include "crop-advisory-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crop-advisory-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.global.services.crop.image }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.global.services.crop.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:postgres_password@postgres:5432/cropdb"
            - name: DATABASE_URL_SYNC
              value: "postgresql://postgres:postgres_password@postgres:5432/cropdb"
            - name: JWT_SECRET
              value: {{ .Values.global.env.JWT_SECRET }}
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: OPENWEATHER_API_KEY
              value: {{ .Values.global.env.OPENWEATHER_API_KEY }}
            - name: PORT
              value: "{{ .Values.global.services.crop.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.global.resources | nindent 12 }}
